services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freqtrade_agent}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgress/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    volumes:
      - freqtrade_data:/freqtrade/user_data
      - ./config/freqtrade.json:/freqtrade/config.json:ro
    command: trade --config /freqtrade/config.json --dry-run
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      FREQTRADE_STRATEGY_DIR: /freqtrade/user_data/strategies
      FREQTRADE_RESULTS_DIR: /freqtrade/user_data/backtest_results
      FREQTRADE_DATA_DIR: /freqtrade/user_data/data
    volumes:
      - freqtrade_data:/freqtrade/user_data
      - ./config/freqtrade.json:/freqtrade/config.json:ro
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src.agent.main --mode loop

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      FREQTRADE_STRATEGY_DIR: /freqtrade/user_data/strategies
      FREQTRADE_RESULTS_DIR: /freqtrade/user_data/backtest_results
      FREQTRADE_DATA_DIR: /freqtrade/user_data/data
    volumes:
      - freqtrade_data:/freqtrade/user_data
      - ./config/freqtrade.json:/freqtrade/config.json:ro
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq src.agent.worker.WorkerSettings

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  freqtrade_data:
